<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Tech Pulse | AI News Dashboard</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
    
    <style>
        :root {
            --primary: #3fb1e5;
            --card-bg: #1c2128;
            --body-bg: #0f1419;
            --text-muted: #8b949e;
        }

        body {
            background-color: var(--body-bg);
            transition: background-color 0.3s ease;
        }

        main.container {
            padding-top: 3rem;
            max-width: 800px;
        }

        h1 {
            color: var(--primary);
            font-weight: 800;
            margin-bottom: 0.5rem;
        }

        h2 {
            font-size: 1.1rem;
            color: #8899a6;
            margin-bottom: 3rem;
        }

        article {
            background: var(--card-bg);
            border: 1px solid #30363d;
            border-radius: 12px;
            transition: transform 0.3s ease, border-color 0.3s ease;
            margin-bottom: 2rem;
        }

        article:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        header strong {
            font-size: 1.3rem;
            color: #f0f6fc;
        }

        p {
            color: var(--text-muted);
        }

        /* Custom Button Styling */
        .custom-btn {
            display: inline-block;
            background-color: var(--primary) !important;
            color: #ffffff !important;
            border: 2px solid var(--primary) !important;
            font-weight: bold;
            border-radius: 8px;
            padding: 0.6rem 1.2rem;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .custom-btn:hover {
            background-color: #ffffff !important;
            color: var(--primary) !important;
            border-color: #ffffff !important;
        }

        #news-container {
            min-height: 400px;
        }
    </style>
</head>
<body>

    <main class="container">
        <hgroup>
            <h1>Global Tech Pulse</h1>
            <h2>Curated AI & Technology Insights</h2>
        </hgroup>

        <section id="news-container">
            <p aria-busy="true">Connecting to global news feed...</p>
        </section>
    </main>

    <script>
    const apiKey = 'cdde8b3131b645b5b4696ae3cc8a8300';
    const url = `https://newsapi.org/v2/everything?q=technology+AI&language=en&pageSize=8&apiKey=${apiKey}`;

    async function fetchNews() {
        const container = document.getElementById('news-container');
        try {
            const response = await fetch(url);
            const data = await response.json();

            if (data.status !== "ok") throw new Error("API_RESTRICTED");

            renderArticles(data.articles);
        } catch (error) {
            console.warn("API Restricted on live host. Loading curated news stories.");
            loadCuratedStories();
        }
    }

    function loadCuratedStories() {
        const backupData = [
            { 
                title: "DLSS 5: Has Nvidia’s AI graphics technology gone too far?", 
                description: "Nvidia revealed a '3D guided neural rendering model' that changes lighting in real-time. From memes to 'yassified' characters, gamers are divided.", 
                url: "https://www.theverge.com" 
            },
            { 
                title: "Signal’s Creator Is Helping Encrypt Meta AI", 
                description: "Moxie Marlinspike is integrating technology from his encrypted chatbot, Confer, into Meta AI to protect millions of conversations.", 
                url: "https://wired.com" 
            },
            { 
                title: "Why people really hate AI", 
                description: "There's an increasing disconnect in culture. While companies hunt for places to deploy AI, the public sentiment is shiftly rapidly.", 
                url: "https://techcrunch.com" 
            },
            { 
                title: "Anthropic Sues Dept of Defense Over Supply-Chain Risk", 
                description: "The Claude developer claims the administration overstepped by escalating a contract dispute into a federal ban on their technology.", 
                url: "https://bloomberg.com" 
            },
            { 
                title: "Bespoke AI models are the next big thing in filmmaking", 
                description: "Hollywood 'AI slop' fears might be premature as creators move toward highly customized models for high-end production.", 
                url: "https://wired.com" 
            },
            { 
                title: "Hasbro CEO: Magic & D&D Will Never Use Generative AI", 
                description: "Both major brands have solidified guidelines barring the use of generative technology in their core artistic products.", 
                url: "https://www.polygon.com" 
            },
            { 
                title: "Sony’s 'Protective AI' aims to defeat Ghibli slop", 
                description: "Sony is building an in-house machine to protect rights holders from copyright infringement by identifying AI-generated content.", 
                url: "https://www.ign.com" 
            },
            { 
                title: "Nvidia’s $4 Billion photonics investment", 
                description: "Nvidia is investing heavily in Lumentum and Coherent to develop optical lasers that move AI data at unprecedented speeds.", 
                url: "https://www.reuters.com" 
            }
        ];
        renderArticles(backupData);
    }

    function renderArticles(articles) {
        const container = document.getElementById('news-container');
        container.innerHTML = ''; 
        
        articles.forEach(article => {
            if(article.title && article.description) {
                const card = document.createElement('article');
                card.innerHTML = `
                    <header><strong>${article.title}</strong></header>
                    <p>${article.description}</p>
                    <footer>
                        <a href="${article.url}" target="_blank" class="custom-btn">Read Full Story</a>
                    </footer>
                `;
                container.appendChild(card);
            }
        });
    }

    fetchNews();
</script>
</body>
</html>
